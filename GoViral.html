<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Go Viral — AI Creator Studio</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

/* ── Tokens ── */
:root {
  --c-bg:#08080e;--c-surface:#0f0f1a;--c-card:#13131f;
  --c-border:rgba(255,255,255,0.07);--c-border-glow:rgba(139,92,246,0.35);
  --c-purple:#8b5cf6;--c-purple-lt:#a78bfa;--c-pink:#ec4899;
  --c-cyan:#22d3ee;--c-amber:#f59e0b;--c-green:#10b981;--c-red:#ef4444;
  --c-text:#f1f0ff;--c-text-2:#9998b8;--c-text-3:#4a4a6a;
  --grad-primary:linear-gradient(135deg,#8b5cf6,#ec4899);
  --grad-glow:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(139,92,246,0.15),transparent);
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --shadow-card:0 1px 0 rgba(255,255,255,0.04) inset,0 0 0 1px rgba(255,255,255,0.06);
  --font-display:'Syne',system-ui,sans-serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out:cubic-bezier(0.22,1,0.36,1);
}

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--c-bg);color:var(--c-text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ── Background Orbs ── */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.35;animation:drift 18s ease-in-out infinite alternate}
.orb-1{width:600px;height:600px;background:radial-gradient(circle,#8b5cf6,transparent 70%);top:-200px;left:-150px;animation-delay:0s}
.orb-2{width:500px;height:500px;background:radial-gradient(circle,#ec4899,transparent 70%);top:20%;right:-200px;animation-delay:-6s}
.orb-3{width:400px;height:400px;background:radial-gradient(circle,#22d3ee,transparent 70%);bottom:-100px;left:30%;animation-delay:-12s}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}

/* ── Shell ── */
.app-shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.site-header{padding:0 2rem;height:64px;display:flex;align-items:center;border-bottom:1px solid var(--c-border);backdrop-filter:blur(20px);background:rgba(8,8,14,0.6);position:sticky;top:0;z-index:100}
.header-inner{max-width:1100px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{font-size:22px;line-height:1}
.logo-wordmark{font-family:var(--font-display);font-size:20px;font-weight:400;color:var(--c-text);letter-spacing:-0.02em}
.logo-wordmark strong{font-weight:800;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-tag{font-size:11px;color:var(--c-text-3);letter-spacing:0.06em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--c-border);border-radius:20px}
.header-nav{display:flex;align-items:center;gap:8px}
.nav-dot{width:6px;height:6px;background:var(--c-green);border-radius:50%;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.nav-stat{font-size:12px;color:var(--c-text-2)}

/* ── Main ── */
.main-content{flex:1;max-width:860px;margin:0 auto;width:100%;padding:3rem 2rem 5rem}
.screen{animation:fadeUp 0.5s var(--ease-out) both}
.screen.hidden{display:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* ── Hero ── */
.hero-copy{text-align:center;margin-bottom:3rem}
.hero-title{font-family:var(--font-display);font-size:clamp(3rem,8vw,5.5rem);font-weight:800;line-height:1.05;letter-spacing:-0.03em;color:var(--c-text);margin-bottom:1rem}
.hero-title em{font-style:normal;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:1.05rem;color:var(--c-text-2);max-width:520px;margin:0 auto;line-height:1.7;font-weight:300}

/* ── Utilities ── */
.glass-card{background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-xl);box-shadow:var(--shadow-card)}
.btn-grad{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 32px;background:var(--grad-primary);color:#fff;font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:0.02em;border:none;border-radius:var(--r-md);cursor:pointer;transition:transform 0.2s var(--ease-spring),box-shadow 0.2s;position:relative;overflow:hidden}
.btn-grad::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background 0.2s}
.btn-grad:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(139,92,246,0.4)}
.btn-grad:hover::after{background:rgba(255,255,255,0.08)}
.btn-grad:active{transform:scale(0.97)}
.btn-grad:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;background:transparent;color:var(--c-text-2);font-family:var(--font-body);font-size:13px;font-weight:500;border:1px solid var(--c-border);border-radius:var(--r-md);cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:rgba(255,255,255,0.2);color:var(--c-text);background:rgba(255,255,255,0.04)}
.score-bar-track{height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width 1.2s var(--ease-out);width:0%}

/* ── Upload Screen ── */
.platform-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1.5rem;justify-content:center}
.platform-label-text{font-size:12px;color:var(--c-text-3);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;white-space:nowrap}
.platform-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:30px;border:1px solid var(--c-border);background:transparent;color:var(--c-text-2);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:all 0.2s}
.platform-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--c-text)}
.platform-btn.active{background:rgba(139,92,246,0.12);border-color:var(--c-border-glow);color:var(--c-purple-lt)}
.platform-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.drop-zone{border:1.5px dashed rgba(255,255,255,0.12);border-radius:var(--r-xl);padding:4rem 2rem;text-align:center;cursor:pointer;transition:border-color 0.25s,background 0.25s;background:rgba(139,92,246,0.02);position:relative;overflow:hidden}
.drop-zone::before{content:'';position:absolute;inset:0;background:var(--grad-glow);pointer-events:none;opacity:0;transition:opacity 0.3s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--c-border-glow);background:rgba(139,92,246,0.05)}
.drop-zone:hover::before,.drop-zone.drag-over::before{opacity:1}
.drop-icon{width:68px;height:68px;margin:0 auto 1.5rem;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:28px;transition:transform 0.3s var(--ease-spring)}
.drop-zone:hover .drop-icon{transform:scale(1.08) translateY(-2px)}
.drop-title{font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--c-text);margin-bottom:6px}
.drop-sub{font-size:14px;color:var(--c-text-2);margin-bottom:1.75rem;font-weight:300}
.drop-types{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:1.5rem}
.drop-type-tag{font-size:11px;color:var(--c-text-3);background:rgba(255,255,255,0.04);border:1px solid var(--c-border);border-radius:6px;padding:3px 9px;letter-spacing:0.06em}
.file-preview{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-lg);margin-bottom:1.25rem;animation:fadeUp 0.35s var(--ease-out) both}
.file-thumb{width:64px;height:64px;border-radius:10px;background:rgba(139,92,246,0.12);border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.file-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.file-info{flex:1;min-width:0}
.file-name{font-size:14px;font-weight:500;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.file-meta{font-size:12px;color:var(--c-text-3)}
.file-remove{width:30px;height:30px;border-radius:8px;border:1px solid var(--c-border);background:transparent;color:var(--c-text-3);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.18s;flex-shrink:0}
.file-remove:hover{border-color:rgba(239,68,68,0.4);color:var(--c-red);background:rgba(239,68,68,0.08)}
.caption-section{margin-top:1.25rem}
.caption-section-label{font-size:12px;color:var(--c-text-3);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:10px}
.caption-textarea{width:100%;min-height:90px;padding:14px 16px;background:var(--c-card);border:1px solid var(--c-border);border-radius:var(--r-md);color:var(--c-text);font-family:var(--font-body);font-size:14px;font-weight:300;line-height:1.6;resize:vertical;transition:border-color 0.2s;outline:none}
.caption-textarea::placeholder{color:var(--c-text-3)}
.caption-textarea:focus{border-color:var(--c-border-glow);box-shadow:0 0 0 3px rgba(139,92,246,0.08)}
.caption-meta-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.caption-hint{font-size:12px;color:var(--c-text-3)}
.char-count{font-size:12px;color:var(--c-text-3);font-variant-numeric:tabular-nums}
.analyze-row{margin-top:1.75rem;display:flex;gap:12px;align-items:center}
.analyze-row .btn-grad{flex:1;font-size:16px;padding:16px 32px;letter-spacing:0.04em}
.analyze-disclaimer{font-size:11px;color:var(--c-text-3);text-align:center;margin-top:10px}

/* ── Loading Screen ── */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 2rem;text-align:center}
.loading-spinner-wrap{position:relative;width:80px;height:80px;margin:0 auto 2.5rem}
.spinner-ring{width:80px;height:80px;border:2px solid rgba(255,255,255,0.06);border-top-color:var(--c-purple);border-right-color:var(--c-pink);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-core{position:absolute;inset:18px;background:rgba(139,92,246,0.1);border-radius:50%;border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;font-size:18px}
.loading-title{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--c-text);margin-bottom:0.4rem;letter-spacing:-0.02em}
.loading-subtitle{font-size:14px;color:var(--c-text-2);font-weight:300;margin-bottom:2.5rem}
.loading-steps{display:flex;flex-direction:column;gap:10px;width:100%;max-width:360px}
.loading-step{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--r-md);background:var(--c-card);border:1px solid var(--c-border);opacity:0.35;transition:all 0.35s var(--ease-out)}
.loading-step.active{opacity:1;border-color:var(--c-border-glow);background:rgba(139,92,246,0.07)}
.loading-step.done{opacity:0.65;border-color:rgba(16,185,129,0.25)}
.step-icon{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all 0.3s}
.loading-step.active .step-icon{background:rgba(139,92,246,0.2)}
.loading-step.done .step-icon{background:rgba(16,185,129,0.15)}
.step-text{font-size:13px;color:var(--c-text-2);font-weight:400;text-align:left}
.loading-step.active .step-text{color:var(--c-text);font-weight:500}
.loading-progress-wrap{width:100%;max-width:360px;margin-top:1.5rem}
.loading-progress-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.loading-progress-fill{height:100%;background:var(--grad-primary);border-radius:2px;width:0%;transition:width 0.6s var(--ease-out)}
.loading-progress-label{display:flex;justify-content:space-between;margin-top:6px}
.loading-progress-label span{font-size:11px;color:var(--c-text-3)}

/* ── Results Screen ── */
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px}
.results-title{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--c-text);letter-spacing:-0.01em}
.results-platform-badge{font-size:12px;color:var(--c-purple-lt);background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.25);border-radius:20px;padding:4px 12px}
.score-hero-wrap{display:grid;grid-template-columns:180px 1fr;gap:2rem;align-items:center;padding:2rem;margin-bottom:1.25rem}
@media(max-width:600px){.score-hero-wrap{grid-template-columns:1fr;text-align:center}}
.score-ring-wrap{position:relative;width:140px;height:140px;margin:0 auto}
.score-ring-wrap svg{transform:rotate(-90deg)}
.score-num-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-big-num{font-family:var(--font-display);font-size:3rem;font-weight:800;line-height:1;letter-spacing:-0.04em;background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-big-denom{font-size:12px;color:var(--c-text-3)}
.score-verdict-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:10px}
.score-verdict-badge.viral{background:rgba(16,185,129,0.12);color:var(--c-green);border:1px solid rgba(16,185,129,0.25)}
.score-verdict-badge.strong{background:rgba(139,92,246,0.12);color:var(--c-purple-lt);border:1px solid rgba(139,92,246,0.25)}
.score-verdict-badge.needs{background:rgba(245,158,11,0.12);color:var(--c-amber);border:1px solid rgba(245,158,11,0.25)}
.score-verdict-badge.low{background:rgba(239,68,68,0.1);color:var(--c-red);border:1px solid rgba(239,68,68,0.25)}
.score-summary-text{font-size:15px;color:var(--c-text);line-height:1.65;font-weight:300;margin-bottom:14px}
.score-meta-chips{display:flex;gap:8px;flex-wrap:wrap}
.score-chip{font-size:11px;color:var(--c-text-3);background:rgba(255,255,255,0.04);border:1px solid var(--c-border);border-radius:6px;padding:4px 10px}
.breakdown-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:1.25rem}
@media(max-width:540px){.breakdown-grid{grid-template-columns:1fr}}
.metric-card{padding:1.25rem;transition:transform 0.2s var(--ease-spring)}
.metric-card:hover{transform:translateY(-2px)}
.metric-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.metric-label-row{display:flex;align-items:center;gap:8px}
.metric-icon{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.metric-label{font-size:13px;color:var(--c-text-2)}
.metric-score-num{font-family:var(--font-display);font-size:1.5rem;font-weight:700;line-height:1}
.metric-insight{font-size:12.5px;color:var(--c-text-2);line-height:1.6;font-weight:300}
.result-panel{padding:1.5rem;margin-bottom:1.25rem}
.panel-header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem}
.panel-icon{width:34px;height:34px;border-radius:10px;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.panel-title{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--c-text);letter-spacing:-0.01em}
.panel-subtitle{font-size:12px;color:var(--c-text-3);margin-top:1px}
.hook-timeline{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.hook-seg{border-radius:10px;padding:12px 10px;text-align:center;position:relative;overflow:hidden;cursor:default}
.hook-seg::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.06);opacity:0;transition:opacity 0.2s}
.hook-seg:hover::after{opacity:1}
.hook-time{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:#fff;margin-bottom:4px}
.hook-seg-label{font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:8px}
.hook-strength-bar{height:3px;background:rgba(255,255,255,0.2);border-radius:2px;overflow:hidden}
.hook-strength-fill{height:100%;background:rgba(255,255,255,0.8);border-radius:2px;transition:width 1s var(--ease-out);width:0%}
.hook-insight-box{padding:12px 16px;background:rgba(139,92,246,0.06);border:1px solid rgba(139,92,246,0.15);border-left:3px solid var(--c-purple);border-radius:0 var(--r-md) var(--r-md) 0;font-size:13.5px;color:var(--c-text-2);line-height:1.7;font-weight:300}
.tab-nav{display:flex;gap:4px;padding:4px;background:rgba(255,255,255,0.04);border-radius:var(--r-md);margin-bottom:1.25rem}
.tab-btn{flex:1;padding:8px 10px;border:none;background:transparent;color:var(--c-text-3);font-family:var(--font-body);font-size:13px;font-weight:500;border-radius:10px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.tab-btn.active{background:var(--c-card);color:var(--c-text);box-shadow:0 1px 4px rgba(0,0,0,0.3)}
.tab-pane{display:none}
.tab-pane.active{display:block;animation:fadeUp 0.25s var(--ease-out) both}
.caption-text-box{padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--c-border);border-radius:var(--r-md);font-size:14px;color:var(--c-text);line-height:1.75;font-weight:300;white-space:pre-wrap;word-break:break-word;min-height:80px}
.caption-text-box.optimized{border-color:rgba(139,92,246,0.2);background:rgba(139,92,246,0.04)}
.copy-btn-row{margin-top:10px;display:flex;justify-content:flex-end}
.caption-why-list{display:flex;flex-direction:column;gap:10px}
.caption-why-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:rgba(255,255,255,0.03);border-radius:var(--r-md);border:1px solid var(--c-border)}
.why-dot{width:20px;height:20px;border-radius:50%;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--c-purple-lt);font-weight:700}
.why-text{font-size:13.5px;color:var(--c-text-2);line-height:1.6;font-weight:300}
.action-list{display:flex;flex-direction:column;gap:10px}
.action-item{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-radius:var(--r-md);border:1px solid var(--c-border);background:rgba(255,255,255,0.02);transition:border-color 0.2s,background 0.2s}
.action-item:hover{border-color:rgba(255,255,255,0.12);background:rgba(255,255,255,0.04)}
.action-priority{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:3px 9px;border-radius:20px;flex-shrink:0;margin-top:1px}
.priority-high{background:rgba(239,68,68,0.1);color:#fc8181;border:1px solid rgba(239,68,68,0.2)}
.priority-medium{background:rgba(245,158,11,0.1);color:#fcd34d;border:1px solid rgba(245,158,11,0.2)}
.priority-low{background:rgba(16,185,129,0.1);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2)}
.action-text{font-size:13.5px;color:var(--c-text);line-height:1.6;font-weight:300}
.trending-two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:540px){.trending-two-col{grid-template-columns:1fr}}
.trending-col-head{font-size:11px;color:var(--c-text-3);letter-spacing:0.08em;text-transform:uppercase;font-weight:500;margin-bottom:10px}
.trend-tags-wrap{display:flex;flex-wrap:wrap;gap:7px}
.trend-tag{font-size:12px;color:var(--c-text-2);background:rgba(255,255,255,0.04);border:1px solid var(--c-border);border-radius:20px;padding:5px 12px;cursor:pointer;transition:all 0.2s}
.trend-tag:hover{border-color:var(--c-border-glow);color:var(--c-purple-lt);background:rgba(139,92,246,0.08)}
.competitor-list{display:flex;flex-direction:column;gap:1px}
.competitor-item{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--c-border)}
.competitor-item:last-child{border-bottom:none}
.comp-emoji-box{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid var(--c-border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.comp-info{flex:1;min-width:0}
.comp-name{font-size:13px;font-weight:500;color:var(--c-text);margin-bottom:2px}
.comp-why{font-size:12px;color:var(--c-text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-right{text-align:right;flex-shrink:0}
.comp-views{font-size:13px;font-weight:500;color:var(--c-text);margin-bottom:2px}
.comp-score-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:rgba(139,92,246,0.12);color:var(--c-purple-lt)}
.reset-row{margin-top:2rem;text-align:center}
</style>
</head>
<body>

<div class="bg-orbs" aria-hidden="true">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="app-shell">
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-wordmark">Go<strong>Viral</strong></span>
        <span class="logo-tag">AI Creator Studio</span>
      </div>
      <nav class="header-nav">
        <span class="nav-dot"></span>
        <span class="nav-stat">59M+ views analyzed</span>
      </nav>
    </div>
  </header>

  <main class="main-content" id="mainContent">
    <section class="screen" id="screenUpload">
      <div class="hero-copy">
        <h1 class="hero-title">Will it <em>go viral?</em></h1>
        <p class="hero-sub">Drop your content. Get an AI virality score, hook analysis, caption optimization, and trending insights — in seconds.</p>
      </div>
      <div id="uploadWidget"></div>
    </section>
    <section class="screen hidden" id="screenLoading">
      <div id="loadingWidget"></div>
    </section>
    <section class="screen hidden" id="screenResults">
      <div id="resultsWidget"></div>
    </section>
  </main>
</div>

<script>
/* ══════════════════════════════════════
   API MODULE
   ══════════════════════════════════════ */
const API = (() => {
  const ENDPOINT = 'https://api.anthropic.com/v1/messages';
  const MODEL    = 'claude-sonnet-4-20250514';

  function buildPrompt(caption, platform, fileName) {
    const fileDesc = fileName ? `File uploaded: "${fileName}"` : 'No file — caption-only analysis.';
    return `You are an expert social media virality analyst for ${platform}.

${fileDesc}
Caption: "${caption || 'No caption provided'}"
Platform: ${platform}

Return ONLY valid JSON, no markdown, no backticks:
{"score":<0-100>,"verdict":"<Viral Potential|Strong Content|Needs Work|Low Reach Risk>","summary":"<1 sentence>","breakdown":{"hook":{"score":<0-100>,"label":"Hook Strength","insight":"<1 sentence>"},"thumbnail":{"score":<0-100>,"label":"Visual Impact","insight":"<1 sentence>"},"pacing":{"score":<0-100>,"label":"Pacing & Flow","insight":"<1 sentence>"},"caption":{"score":<0-100>,"label":"Caption Score","insight":"<1 sentence>"}},"hookAnalysis":{"segments":[{"second":"0s","strength":<0-100>,"label":"Opening frame"},{"second":"1s","strength":<0-100>,"label":"Visual hook"},{"second":"2s","strength":<0-100>,"label":"Tension build"},{"second":"3s","strength":<0-100>,"label":"Payoff setup"}],"tip":"<2 sentences>"},"captionOptimized":"<rewritten caption>","captionWhys":["<reason 1>","<reason 2>","<reason 3>"],"actions":[{"priority":"high","text":"<action>"},{"priority":"high","text":"<action>"},{"priority":"medium","text":"<action>"},{"priority":"medium","text":"<action>"},{"priority":"low","text":"<action>"}],"trendingHashtags":["<tag>","<tag>","<tag>","<tag>","<tag>","<tag>"],"trendingAudio":["<sound>","<sound>","<sound>","<sound>"],"competitors":[{"name":"<name>","views":"<e.g.4.2M>","score":<0-100>,"emoji":"<emoji>","why":"<1 sentence>"},{"name":"<name>","views":"<views>","score":<0-100>,"emoji":"<emoji>","why":"<1 sentence>"},{"name":"<name>","views":"<views>","score":<0-100>,"emoji":"<emoji>","why":"<1 sentence>"}]}`;
  }

  async function analyze(caption, platform, fileName) {
    try {
      const res = await fetch(ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: MODEL, max_tokens: 1000, messages: [{ role: 'user', content: buildPrompt(caption, platform, fileName) }] })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const raw  = data.content?.find(b => b.type === 'text')?.text || '';
      return JSON.parse(raw.replace(/```json|```/g, '').trim());
    } catch (err) {
      console.warn('API error — fallback:', err.message);
      return fallback(caption, platform);
    }
  }

  function fallback(caption, platform) {
    const has = caption && caption.length > 10;
    const score = has ? 62 : 47;
    return {
      score, verdict: score >= 70 ? 'Strong Content' : 'Needs Work',
      summary: `Your ${platform} content shows potential but needs targeted improvements to break through the algorithm.`,
      breakdown: {
        hook:      { score: 58, label: 'Hook Strength',  insight: 'First 3 seconds lack a pattern interrupt to stop scrollers mid-feed.' },
        thumbnail: { score: 71, label: 'Visual Impact',  insight: 'Composition is solid but contrast could be boosted for small screens.' },
        pacing:    { score: 54, label: 'Pacing & Flow',  insight: 'Pacing feels slow — trimming 20% of the intro could lift retention.' },
        caption:   { score: has ? 64 : 28, label: 'Caption Score', insight: has ? 'Caption is readable but missing urgency triggers and hashtags.' : 'No caption — a missed opportunity for discoverability.' }
      },
      hookAnalysis: {
        segments: [{ second:'0s',strength:40,label:'Opening frame' },{ second:'1s',strength:55,label:'Visual hook' },{ second:'2s',strength:70,label:'Tension build' },{ second:'3s',strength:62,label:'Payoff setup' }],
        tip: `On ${platform} you have ~0.4 seconds before a swipe. Your first frame needs a bold visual or text overlay creating instant curiosity. Try starting mid-action rather than with an establishing shot.`
      },
      captionOptimized: `POV: You just discovered the thing everyone's been sleeping on 👀\n\nDrop a 🔥 if this hit different\n\n#trending #${platform}tips #viral #fyp #contentcreator`,
      captionWhys: ['The original caption is passive — viewers scroll past descriptions but stop for tension.','Missing a CTA means zero engagement signal, tanking algorithmic reach.','The optimized version uses curiosity-gap framing and a low-friction emoji CTA.'],
      actions: [
        { priority:'high',   text:'Reshoot your opening 2 seconds — start mid-action or with a bold text overlay that teases the payoff.' },
        { priority:'high',   text:'Add on-screen text in the first 1.5s: "Wait for it…" or "This changed everything."' },
        { priority:'medium', text:'Boost thumbnail contrast — a bright solid background behind your subject lifts CTR ~30%.' },
        { priority:'medium', text:'Add 3–5 niche hashtags alongside broad ones to hit specific engaged audiences.' },
        { priority:'low',    text:`Post 7–9pm local time for maximum initial velocity on ${platform}.` }
      ],
      trendingHashtags: ['#fyp','#viral2025','#trending','#contentcreator','#reels','#foryoupage'],
      trendingAudio: ['Espresso – Sabrina Carpenter','BIRDS OF A FEATHER','Good Luck, Babe!','MILLION DOLLAR BABY'],
      competitors: [
        { name:'Silent reaction format', views:'12.4M', score:91, emoji:'🤌', why:'Exaggerated facial expressions drive massive relatability and shares without words.' },
        { name:'The "5 things" format',  views:'3.8M',  score:78, emoji:'🧠', why:'Numbered hooks create a completion obligation — viewers stay for all 5.' },
        { name:'Mid-conflict open',      views:'6.1M',  score:84, emoji:'🎬', why:'Opening with a question only the full video resolves eliminates early drop-off.' }
      ]
    };
  }

  return { analyze };
})();

/* ══════════════════════════════════════
   UPLOAD SCREEN MODULE
   ══════════════════════════════════════ */
const UploadScreen = (() => {
  const PLATFORMS = [
    { id:'tiktok',    label:'TikTok',        color:'#ff0050' },
    { id:'instagram', label:'Instagram',      color:'#e1306c' },
    { id:'youtube',   label:'YouTube Shorts', color:'#ff0000' },
    { id:'twitter',   label:'X / Twitter',   color:'#1d9bf0' },
    { id:'linkedin',  label:'LinkedIn',       color:'#0a66c2' },
  ];
  let selectedPlatform = 'tiktok';
  let selectedFile     = null;

  function render(container) {
    container.innerHTML = `
      <div class="platform-row">
        <span class="platform-label-text">Platform</span>
        ${PLATFORMS.map(p => `<button class="platform-btn ${p.id===selectedPlatform?'active':''}" data-platform="${p.id}"><span class="platform-dot" style="background:${p.color}"></span>${p.label}</button>`).join('')}
      </div>
      <div class="glass-card drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Upload content">
        <div class="drop-icon">📁</div>
        <div class="drop-title">Drop your content here</div>
        <div class="drop-sub">Video, image, or thumbnail — we'll analyze what makes it shareable</div>
        <button class="btn-grad" id="browseBtn" type="button">↑ &nbsp;Browse files</button>
        <input type="file" id="fileInput" accept="video/*,image/*" style="display:none" aria-hidden="true"/>
        <div class="drop-types">${['MP4','MOV','AVI','JPG','PNG','GIF','WEBP'].map(t=>`<span class="drop-type-tag">${t}</span>`).join('')}</div>
      </div>
      <div id="filePreview" style="display:none"></div>
      <div class="caption-section">
        <div class="caption-section-label">Caption / hook text <span style="color:var(--c-text-3);text-transform:none;letter-spacing:0;font-size:11px">— optional but recommended</span></div>
        <textarea id="captionInput" class="caption-textarea" placeholder="Paste your caption, video script, or hook text here…" rows="3"></textarea>
        <div class="caption-meta-row">
          <span class="caption-hint">More context = more specific feedback.</span>
          <span class="char-count" id="charCount">0 chars</span>
        </div>
      </div>
      <div class="analyze-row">
        <button class="btn-grad" id="analyzeBtn" type="button">✦ &nbsp;Analyze for virality</button>
      </div>
      <p class="analyze-disclaimer">Content is analyzed by Claude AI and never stored. Results are for creative guidance only.</p>
    `;
    _bindEvents(container);
  }

  function _bindEvents(container) {
    container.querySelectorAll('.platform-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        container.querySelectorAll('.platform-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedPlatform = btn.dataset.platform;
      });
    });
    const dropZone  = container.querySelector('#dropZone');
    const fileInput = container.querySelector('#fileInput');
    const browseBtn = container.querySelector('#browseBtn');
    browseBtn.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') fileInput.click(); });
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) _handleFile(e.dataTransfer.files[0],container); });
    fileInput.addEventListener('change', e => { if(e.target.files[0]) _handleFile(e.target.files[0],container); });
    container.querySelector('#captionInput').addEventListener('input', e => { container.querySelector('#charCount').textContent = `${e.target.value.length} chars`; });
    container.querySelector('#analyzeBtn').addEventListener('click', () => {
      const caption = container.querySelector('#captionInput').value.trim();
      if (!selectedFile && !caption) {
        const dz = container.querySelector('#dropZone');
        dz.style.borderColor = 'var(--c-red)';
        setTimeout(() => dz.style.borderColor = '', 2200);
        return;
      }
      App.startAnalysis({ platform: selectedPlatform, caption, file: selectedFile });
    });
  }

  function _handleFile(file, container) {
    selectedFile = file;
    const sizeMB = (file.size/1024/1024).toFixed(1);
    const ext    = file.name.split('.').pop().toUpperCase();
    const isImg  = file.type.startsWith('image/');
    const preview = container.querySelector('#filePreview');
    const thumb   = isImg ? `<img src="${URL.createObjectURL(file)}" alt="preview"/>` : '▶';
    preview.innerHTML = `<div class="file-preview"><div class="file-thumb">${thumb}</div><div class="file-info"><div class="file-name">${file.name}</div><div class="file-meta">${ext} · ${sizeMB} MB</div></div><button class="file-remove" id="removeFile" aria-label="Remove">✕</button></div>`;
    preview.style.display = 'block';
    preview.querySelector('#removeFile').addEventListener('click', () => { selectedFile=null; preview.style.display='none'; container.querySelector('#fileInput').value=''; });
  }

  function reset() { selectedFile = null; }
  return { render, reset };
})();

/* ══════════════════════════════════════
   LOADING SCREEN MODULE
   ══════════════════════════════════════ */
const LoadingScreen = (() => {
  const STEPS = [
    { icon:'👁',  text:'Scanning visual composition & framing'  },
    { icon:'⚡',  text:'Evaluating hook strength (first 3s)'    },
    { icon:'✍️',  text:'Optimizing caption and hashtags'         },
    { icon:'📊',  text:'Benchmarking against trending content'   },
    { icon:'🏆',  text:'Generating your virality score'         },
  ];
  let _timers = [];

  function render(container) {
    container.innerHTML = `
      <div class="loading-wrap">
        <div class="loading-spinner-wrap"><div class="spinner-ring"></div><div class="spinner-core">✦</div></div>
        <div class="loading-title">Analyzing your content…</div>
        <div class="loading-subtitle">Running 5 AI diagnostic modules</div>
        <div class="loading-steps">
          ${STEPS.map((s,i) => `<div class="loading-step" id="lstep-${i}"><div class="step-icon">${s.icon}</div><div class="step-text">${s.text}</div></div>`).join('')}
        </div>
        <div class="loading-progress-wrap">
          <div class="loading-progress-track"><div class="loading-progress-fill" id="progressFill"></div></div>
          <div class="loading-progress-label"><span id="progressPct">0%</span><span>AI Analysis</span></div>
        </div>
      </div>`;
    _clearTimers();
    STEPS.forEach((_,i) => {
      _timers.push(setTimeout(() => {
        if(i>0){ const p=container.querySelector(`#lstep-${i-1}`); if(p){p.classList.remove('active');p.classList.add('done');p.querySelector('.step-icon').textContent='✓';} }
        const c=container.querySelector(`#lstep-${i}`); if(c) c.classList.add('active');
        const pct=Math.round((i+1)*100/STEPS.length);
        const f=container.querySelector('#progressFill'); if(f) f.style.width=pct+'%';
        const l=container.querySelector('#progressPct'); if(l) l.textContent=pct+'%';
      }, i*700));
    });
  }

  function complete(container) {
    _clearTimers();
    STEPS.forEach((_,i) => { const s=container.querySelector(`#lstep-${i}`); if(s){s.classList.remove('active');s.classList.add('done');s.querySelector('.step-icon').textContent='✓';} });
    const f=container.querySelector('#progressFill'); if(f) f.style.width='100%';
    const l=container.querySelector('#progressPct'); if(l) l.textContent='100%';
  }

  function _clearTimers() { _timers.forEach(clearTimeout); _timers=[]; }
  return { render, complete };
})();

/* ══════════════════════════════════════
   RESULTS SCREEN MODULE
   ══════════════════════════════════════ */
const ResultsScreen = (() => {
  const VERDICT_CLASS = { 'Viral Potential':'viral','Strong Content':'strong','Needs Work':'needs','Low Reach Risk':'low' };
  const METRIC_META   = {
    hook:      { icon:'⚡', bg:'rgba(245,158,11,0.12)',  color:'#fcd34d' },
    thumbnail: { icon:'🖼', bg:'rgba(34,211,238,0.1)',   color:'#67e8f9' },
    pacing:    { icon:'🎬', bg:'rgba(16,185,129,0.1)',   color:'#6ee7b7' },
    caption:   { icon:'✍️', bg:'rgba(139,92,246,0.12)', color:'#a78bfa' },
  };
  const HOOK_COLORS = ['#8b5cf6','#ec4899','#f59e0b','#22d3ee'];

  function render(container, data, platform) {
    const vc  = VERDICT_CLASS[data.verdict] || 'needs';
    const circ = 2*Math.PI*54;
    const rc   = data.score>=80?'#10b981':data.score>=60?'#8b5cf6':data.score>=40?'#f59e0b':'#ef4444';
    const vEmoji = {viral:'🚀',strong:'✦',needs:'⚡',low:'⚠'}[vc]||'✦';
    const cap = window.__lastCaption || '';

    container.innerHTML = `
      <div class="results-header">
        <div class="results-title">Virality Report</div>
        <span class="results-platform-badge">✦ ${platform.charAt(0).toUpperCase()+platform.slice(1)}</span>
      </div>

      <div class="glass-card score-hero-wrap">
        <div class="score-ring-wrap">
          <svg width="140" height="140" viewBox="0 0 140 140" aria-hidden="true">
            <circle cx="70" cy="70" r="54" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="8"/>
            <circle cx="70" cy="70" r="54" fill="none" stroke="${rc}" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="${circ}" stroke-dashoffset="${circ}" id="scoreRing"
              style="transition:stroke-dashoffset 1.3s cubic-bezier(0.22,1,0.36,1)"/>
          </svg>
          <div class="score-num-overlay">
            <span class="score-big-num" id="scoreNum">0</span>
            <span class="score-big-denom">/100</span>
          </div>
        </div>
        <div>
          <span class="score-verdict-badge ${vc}">${vEmoji} ${data.verdict}</span>
          <p class="score-summary-text">${data.summary}</p>
          <div class="score-meta-chips"><span class="score-chip">AI Powered</span><span class="score-chip">5 Metrics</span><span class="score-chip">Actionable Insights</span></div>
        </div>
      </div>

      <div class="breakdown-grid">
        ${Object.entries(data.breakdown).map(([k,v]) => { const m=METRIC_META[k]||METRIC_META.hook; return `<div class="glass-card metric-card"><div class="metric-card-top"><div class="metric-label-row"><div class="metric-icon" style="background:${m.bg}">${m.icon}</div><span class="metric-label">${v.label}</span></div><span class="metric-score-num" style="color:${m.color}" id="mn-${k}">0</span></div><div class="score-bar-track" style="margin-bottom:10px"><div class="score-bar-fill" id="mb-${k}" style="background:${m.color}"></div></div><div class="metric-insight">${v.insight}</div></div>`; }).join('')}
      </div>

      <div class="glass-card result-panel">
        <div class="panel-header"><div class="panel-icon">⚡</div><div><div class="panel-title">Hook analysis — first 3 seconds</div><div class="panel-subtitle">The window that decides everything</div></div></div>
        <div class="hook-timeline">
          ${data.hookAnalysis.segments.map((s,i)=>`<div class="hook-seg" style="background:${HOOK_COLORS[i]}aa" title="${s.second}: ${s.label}"><div class="hook-time">${s.second}</div><div class="hook-seg-label">${s.label}</div><div class="hook-strength-bar"><div class="hook-strength-fill" id="hf-${i}"></div></div></div>`).join('')}
        </div>
        <div class="hook-insight-box">${data.hookAnalysis.tip}</div>
      </div>

      <div class="glass-card result-panel">
        <div class="panel-header"><div class="panel-icon">✍️</div><div><div class="panel-title">Caption optimization</div><div class="panel-subtitle">What to say, and how to say it</div></div></div>
        <div class="tab-nav">
          <button class="tab-btn active" data-tab="orig">Your caption</button>
          <button class="tab-btn" data-tab="opt">Optimized</button>
          <button class="tab-btn" data-tab="why">Why it matters</button>
        </div>
        <div class="tab-pane active" id="tab-orig"><div class="caption-text-box">${_esc(cap||'(No caption provided)')}</div></div>
        <div class="tab-pane" id="tab-opt"><div class="caption-text-box optimized">${_esc(data.captionOptimized||'')}</div><div class="copy-btn-row"><button class="btn-ghost" id="copyBtn">⎘ &nbsp;Copy caption</button></div></div>
        <div class="tab-pane" id="tab-why"><div class="caption-why-list">${(data.captionWhys||[]).map((w,i)=>`<div class="caption-why-item"><span class="why-dot">${i+1}</span><span class="why-text">${w}</span></div>`).join('')}</div></div>
      </div>

      <div class="glass-card result-panel">
        <div class="panel-header"><div class="panel-icon">✅</div><div><div class="panel-title">Actionable improvements</div><div class="panel-subtitle">Prioritized for maximum impact</div></div></div>
        <div class="action-list">${(data.actions||[]).map(a=>`<div class="action-item"><span class="action-priority priority-${a.priority}">${a.priority}</span><span class="action-text">${a.text}</span></div>`).join('')}</div>
      </div>

      <div class="glass-card result-panel">
        <div class="panel-header"><div class="panel-icon">📈</div><div><div class="panel-title">Trending right now</div><div class="panel-subtitle">Tap to highlight</div></div></div>
        <div class="trending-two-col">
          <div><div class="trending-col-head"># Hashtags</div><div class="trend-tags-wrap">${(data.trendingHashtags||[]).map(t=>`<span class="trend-tag">${t}</span>`).join('')}</div></div>
          <div><div class="trending-col-head">♫ Audio</div><div class="trend-tags-wrap">${(data.trendingAudio||[]).map(a=>`<span class="trend-tag">🎵 ${a}</span>`).join('')}</div></div>
        </div>
      </div>

      <div class="glass-card result-panel">
        <div class="panel-header"><div class="panel-icon">👥</div><div><div class="panel-title">Competitor benchmark</div><div class="panel-subtitle">What top formats do differently</div></div></div>
        <div class="competitor-list">${(data.competitors||[]).map(c=>`<div class="competitor-item"><div class="comp-emoji-box">${c.emoji}</div><div class="comp-info"><div class="comp-name">${c.name}</div><div class="comp-why">${c.why}</div></div><div class="comp-right"><div class="comp-views">${c.views}</div><span class="comp-score-badge">${c.score}/100</span></div></div>`).join('')}</div>
      </div>

      <div class="reset-row"><button class="btn-ghost" id="resetBtn">↺ &nbsp;Analyze another piece of content</button></div>
    `;

    _animate(container, data);
    _bind(container, data);
  }

  function _animate(container, data) {
    requestAnimationFrame(() => {
      const ring = container.querySelector('#scoreRing');
      if (ring) ring.style.strokeDashoffset = 2*Math.PI*54*(1-data.score/100);
    });
    _countUp(container.querySelector('#scoreNum'), data.score, 1400);
    Object.entries(data.breakdown).forEach(([k,v]) => {
      const bar = container.querySelector(`#mb-${k}`);
      const num = container.querySelector(`#mn-${k}`);
      if (bar) setTimeout(() => bar.style.width=v.score+'%', 100);
      if (num) _countUp(num, v.score, 1000);
    });
    (data.hookAnalysis?.segments||[]).forEach((s,i) => {
      const f = container.querySelector(`#hf-${i}`);
      if (f) setTimeout(() => f.style.width=s.strength+'%', 200+i*100);
    });
  }

  function _bind(container, data) {
    container.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const panel = btn.closest('.result-panel');
        panel.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        panel.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
        btn.classList.add('active');
        panel.querySelector(`#tab-${btn.dataset.tab}`)?.classList.add('active');
      });
    });
    container.querySelector('#copyBtn')?.addEventListener('click', () => {
      navigator.clipboard.writeText(data.captionOptimized||'').catch(()=>{});
      const b = container.querySelector('#copyBtn');
      b.textContent = '✓  Copied!';
      setTimeout(() => b.innerHTML='⎘ &nbsp;Copy caption', 2000);
    });
    container.querySelector('#resetBtn')?.addEventListener('click', App.reset);
    container.querySelectorAll('.trend-tag').forEach(tag => {
      tag.addEventListener('click', () => { tag.style.borderColor='var(--c-border-glow)'; tag.style.color='var(--c-purple-lt)'; tag.style.background='rgba(139,92,246,0.1)'; });
    });
  }

  function _countUp(el, target, duration) {
    if (!el) return;
    let n=0; const inc=target/(duration/16);
    const t=setInterval(()=>{ n=Math.min(n+inc,target); el.textContent=Math.round(n); if(n>=target) clearInterval(t); },16);
  }

  function _esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  return { render };
})();

/* ══════════════════════════════════════
   APP ORCHESTRATOR
   ══════════════════════════════════════ */
const App = (() => {
  const screens = { upload:document.getElementById('screenUpload'), loading:document.getElementById('screenLoading'), results:document.getElementById('screenResults') };
  const widgets = { upload:document.getElementById('uploadWidget'), loading:document.getElementById('loadingWidget'), results:document.getElementById('resultsWidget') };

  function init() { UploadScreen.render(widgets.upload); _show('upload'); }

  function _show(name) {
    Object.entries(screens).forEach(([k,el]) => el.classList.toggle('hidden', k!==name));
    window.scrollTo({ top:0, behavior:'smooth' });
  }

  async function startAnalysis({ platform, caption, file }) {
    window.__lastCaption = caption;
    LoadingScreen.render(widgets.loading);
    _show('loading');
    const data = await API.analyze(caption, platform, file?.name||null);
    LoadingScreen.complete(widgets.loading);
    await new Promise(r => setTimeout(r, 600));
    ResultsScreen.render(widgets.results, data, platform);
    _show('results');
  }

  function reset() { UploadScreen.reset(); UploadScreen.render(widgets.upload); _show('upload'); }

  return { init, startAnalysis, reset };
})();

document.addEventListener('DOMContentLoaded', App.init);
</script>
